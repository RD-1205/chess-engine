<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Game</title>
    <link rel="stylesheet" th:href="@{/static/css/styles.css}">
</head>
<body>
    <div class="container">
        <header>
            <h1>♟️ Chess Game</h1>
            <div>
                <span id="status-indicator" class="status-dot"></span>
                <span id="status-text">Connecting...</span>
            </div>
        </header>
        
        <div class="game-container">
            <aside>
                <div class="info-card">
                    <h2>Game Info</h2>
                    <p><strong>Turn:</strong> <span id="current-turn">White</span></p>
                    <p><strong>Status:</strong> <span id="game-status">Active</span></p>
                    <div id="check-warning" class="hidden" style="background: #fef3c7; padding: 10px; margin-top: 10px; border-radius: 5px;">⚠️ Check!</div>
                </div>
                <button id="new-game-btn" class="btn btn-primary">New Game</button>
                <button id="reset-game-btn" class="btn btn-secondary">Reset Game</button>
            </aside>
            
            <main class="board-container">
                <div id="chessboard" class="chessboard"></div>
                <div id="message" class="message"></div>
            </main>
        </div>
    </div>
    
    <script th:src="@{/static/js/chess-api.js}"></script>
    <script th:src="@{/static/js/chess-ui.js}"></script>
    <script th:src="@{/static/js/app.js}"></script>
</body>
</html>
